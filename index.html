<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="226 POS">

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b343b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>226 POS - Hệ thống bán hàng</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
</head>
<body>
    <header class="pos-header">
        <div class="logo">
            <i class="fa-solid fa-store"></i> 226 POS
        </div>
        
        <div class="branch-info" style="color: #00cec9; font-weight: bold; font-size: 1.1rem;">
            <i class="fa-solid fa-location-dot"></i> <span id="current-branch-name">Đang tải...</span>
        </div>

<div class="user-info-container">
            <div class="user-profile">
                <i class="fa-solid fa-circle-user"></i> <span id="current-username">Thu ngân</span>
            </div>
            
            <div class="dropdown-menu-wrapper">
                <button class="hamburger-btn" onclick="toggleUserMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
<div class="dropdown-content" id="user-dropdown">
    <a href="manager.html"><i class="fa-solid fa-chart-pie" style="color: #0984e3;"></i> Quản lý cửa hàng</a>
    <a href="admin.html"><i class="fa-solid fa-gears" style="color: #00cec9;"></i> Hệ thống tổng</a>
    <a href="#" onclick="openPOSReportModal()"><i class="fa-solid fa-chart-line" style="color: #00b894;"></i> Xem báo cáo doanh thu</a>
    <div class="dropdown-divider"></div>
    <a href="#" onclick="logout()" style="color: #d63031;"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a>
</div>
            </div>
        </div>
    </header>

    <div class="pos-container">
<main class="menu-area">
            <div class="search-bar-container">
                <div class="search-input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="product-search" placeholder="Tìm kiếm món ăn (VD: sua dau, tra chanh...)" oninput="handleSearch(event)">
                </div>
            </div>

<div class="categories" id="category-list">
    </div>
            
            <div class="product-grid" id="product-grid">
                </div>
        </main>

        <aside class="order-area">
<div class="order-header">
    <h2>Đơn hàng hiện tại</h2>
    <div style="display: flex; align-items: center; gap: 10px;">
        <span class="order-type"><i class="fa-solid fa-utensils"></i> Tại bàn</span>
        <button class="close-cart-mobile" onclick="toggleMobileCart()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
</div>
            
            <div class="order-items" id="order-items">
                </div>
            
            <div class="order-summary">
                <div class="summary-row">
                    <span>Số lượng:</span>
                    <span id="total-qty">0</span>
                </div>
                <div class="summary-row">
                    <span>Tạm tính:</span>
                    <span id="sub-total">0đ</span>
                </div>
                <div class="summary-row total-row">
                    <span>Khách cần trả:</span>
                    <span id="total-price">0đ</span>
                </div>
            </div>
            
            <div class="order-actions">
                <button class="btn-cancel" onclick="clearOrder()">
                    <i class="fa-solid fa-trash"></i> Hủy
                </button>
                <button class="btn-pay" onclick="checkout()">
                    <i class="fa-solid fa-money-bill-wave"></i> Thanh toán (F9)
                </button>
            </div>
        </aside>
    </div>

<div id="pos-report-modal" class="mobile-modal-overlay" onclick="closeMobileModal('pos-report-modal')">
    <div class="mobile-modal-sheet" onclick="event.stopPropagation()">
        <div class="mobile-modal-handle"></div>
        
        <div class="mobile-modal-header">
            <h3 style="flex: 1;"><i class="fa-solid fa-chart-line" style="color: #00b894;"></i> Báo cáo doanh thu chi nhánh</h3>
            <button class="mobile-close-btn" onclick="closeMobileModal('pos-report-modal')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="mobile-modal-body">
<div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
    <label style="font-weight: 600; white-space: nowrap; color: #2d3436; width: 85px;">Ngày:</label>
    <input type="text" id="report-select-date" placeholder="Chọn ngày..." style="flex: 1; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 1rem; outline: none; background: #fff; cursor: pointer;">
</div>

<div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
    <label style="font-weight: 600; white-space: nowrap; color: #2d3436; width: 85px;">Thu ngân:</label>
    <select id="report-select-cashier" onchange="handleReportFilterChange()" style="flex: 1; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 1rem; outline: none; background: #f8f9fa;">
        <option value="all">-- Tất cả --</option>
    </select>
</div>

<div style="margin-bottom: 20px;">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <input type="checkbox" id="enable-time-filter" onchange="toggleTimeFilter()" style="width: 18px; height: 18px; cursor: pointer;">
        <label for="enable-time-filter" style="font-weight: 600; color: #0984e3; cursor: pointer; user-select: none;">Bật lọc theo khung giờ</label>
    </div>
    
    <div id="time-filter-wrapper" style="display: none; align-items: center; gap: 10px; padding-left: 28px;">
        <input type="text" id="report-time-start" placeholder="Từ giờ..." style="flex: 1; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 1rem; outline: none; background: #fff; cursor: pointer;">
        <span style="font-weight: bold; color: #636e72;">-</span>
        <input type="text" id="report-time-end" placeholder="Đến giờ..." style="flex: 1; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 1rem; outline: none; background: #fff; cursor: pointer;">
    </div>
</div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1; background: #f1f2f6; padding: 15px; border-radius: 12px; border-left: 5px solid #00b894; text-align: center;">
                    <small style="color: #636e72; font-weight: 600; display: block; margin-bottom: 3px;">TỔNG DOANH THU</small>
                    <div id="pos-report-revenue" style="font-size: 1.4rem; font-weight: bold; color: #2d3436;">0đ</div>
                </div>
                <div style="flex: 1; background: #f1f2f6; padding: 15px; border-radius: 12px; border-left: 5px solid #0984e3; text-align: center;">
                    <small style="color: #636e72; font-weight: 600; display: block; margin-bottom: 3px;">TỔNG SỐ ĐƠN</small>
                    <div id="pos-report-orders" style="font-size: 1.4rem; font-weight: bold; color: #2d3436;">0</div>
                </div>
            </div>
            
            <label style="display: block; font-weight: 600; margin-bottom: 10px; color: #2d3436;"><i class="fa-solid fa-list-ul"></i> Nhật ký hóa đơn:</label>
            <div id="pos-report-invoice-list" style="max-height: 250px; overflow-y: auto; background: #f8f9fa; border-radius: 10px; border: 1px solid #dfe6e9; padding: 12px; display: flex; flex-direction: column; gap: 10px;">
                </div>

            <div id="pos-report-pagination" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 15px; flex-wrap: wrap;">
                </div>
        </div>
    </div>
</div>
<div class="mobile-cart-btn" onclick="toggleMobileCart()">
    <i class="fa-solid fa-basket-shopping"></i>
    <span class="cart-badge" id="mobile-cart-badge">0</span>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-init.js"></script>
    <script src="script.js?v=2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/vn.js"></script>
</body>
</html>
