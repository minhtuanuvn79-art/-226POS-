<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="226 POS">

<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b343b">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - 226 POS</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-store" style="color: #00cec9; font-size: 2rem;"></i>
            <h2>226 POS</h2>
            <p>Hệ thống quản lý chuỗi cửa hàng thức ăn</p>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username"><i class="fa-solid fa-user"></i> Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tài khoản..." required>
            </div>
            <div class="input-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập hệ thống</button>
        </form>
    </div>
<div id="branch-select-modal" class="custom-modal-overlay" onclick="closeBranchModal()">
        <div class="custom-modal" onclick="event.stopPropagation()" style="max-height: 80vh; display: flex; flex-direction: column;">
            <div class="custom-modal-icon info" style="font-size: 3rem; margin-bottom: 10px;"><i class="fa-solid fa-code-branch"></i></div>
            <h3 class="custom-modal-title">Chọn nơi làm việc</h3>
            <p class="custom-modal-msg">Tài khoản này được phân quyền ở nhiều chi nhánh. Vui lòng chọn chi nhánh bạn muốn đăng nhập:</p>
            
            <div id="branch-buttons-container" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; overflow-y: auto; padding: 5px;">
                </div>
            
            <div class="custom-modal-actions">
                <button class="custom-modal-btn modal-btn-cancel show" onclick="closeBranchModal()" style="width: 100%;">Quay lại</button>
            </div>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-init.js?v=2"></script>
    <script src="admin-script.js"></script>
</body>
</html>
